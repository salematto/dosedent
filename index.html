<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;

            margin: 0 auto;
        }

            padding: 0.5rem;
            border-radius: 100px;
        }

            font-weight: 800;
            color: #1f3a6b;
            margin: 0.5rem 0;
        }

            font-weight: 500;
            margin-bottom: 1.8rem;
            font-size: 1.1rem;
        }

            color: #1e3a5f;
            padding: 6px 18px;

            margin: 25px 0 20px;
        }

            border: 2px solid #cddff7;
            border-radius: 60px;
            padding: 14px 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #1f2f47;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;

        }

            color: white !important;

        .wrong-highlight {
            background: #e63946 !important;
            border-color: #b91c2c !important;
            color: white !important;
            text-decoration: line-through;
        }
        .explanation-box {
            background: #fef9e6;
            border-right: 6px solid #f4a261;
            padding: 16px 22px;
            border-radius: 28px;
            margin: 20px 0 15px;
            color: #2c3e2f;
            font-size: 1rem;
            line-height: 1.6;
        }
        .next-auto-msg {
            text-align: center;
            font-size: 0.85rem;
            background: #00000030;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 100px;

            border: none;

</head>

    </div>
</div>

        { text: "ما هو التخدير الموضعي المفضل لدى مرضى ارتفاع الضغط غير المسيطر عليه؟", options: ["ليدوكايين مع إبينفرين", "أرتيكايين مع إبينفرين", "ميبيفاكايين 3% بدون إبينفرين", "بوبيفاكايين مع إبينفرين"], correct: 2, explanation: "✅ يفضل استخدام مخدر بدون إبينفرين لتجنب ارتفاع الضغط أو عدم انتظام الضربات." },
        { text: "أي مضاد حيوي يمكن أن يسبب التهاب الكبد المرتبط بالدواء بشكل شائع؟", options: ["أموكسيسيلين", "أموكسيسيلين/كلافولانيت", "كليندامايسين", "ميترونيدازول"], correct: 1, explanation: "✅ أموكسيسيلين/كلافولانيت هو أحد أكثر المضادات تسبباً في اليرقان الركودي." },
        { text: "ما هو الدواء الذي يستخدم لعلاج نزيف ما بعد الخلع لدى مريض يعاني من الهيموفيليا (قلة العامل الثامن)؟", options: ["حمض الترانيكساميك فموياً", "فيتامين ك", "الأسبرين", "الوارفارين"], correct: 0, explanation: "✅ حمض الترانيكساميك مضاد للانحلال الفبريني، يستخدم موضعياً أو فموياً في مرضى الهيموفيليا." },
        { text: "أي من الآتي يعد من مضادات القيء المستخدمة في عيادة الأسنان بعد التخدير العام؟", options: ["أوندانسيترون", "ميتوكلوبراميد", "دومبيريدون", "كلوربرومازين"], correct: 0, explanation: "✅ أوندانسيترون هو مضاد قيء قوي وآمن، يستخدم للغثيان ما بعد التخدير." },
        { text: "مريض يتناول ليفوثيروكسين (للغدة الدرقية). كيف يؤثر بعض مضادات الحموضة على امتصاصه؟", options: ["يزيد الامتصاص", "ينقص الامتصاص (بسبب الكالسيوم أو الألمنيوم)", "لا تأثير", "يسبب تضخم الغدة"], correct: 1, explanation: "✅ مضادات الحموضة التي تحتوي على ألمنيوم أو كالسيوم تقلل امتصاص ليفوثيروكسين، يجب الفصل بساعتين." },
        { text: "ما هو خيار المسكن الأنسب لمريض يعاني من ألم مزمن في المفصل الصدغي مع التهاب خفيف؟", options: ["ترامادول يومياً", "إيبوبروفين عند الحاجة", "كودايين فموي", "باراسيتامول فقط"], correct: 1, explanation: "✅ NSAIDs عند الحاجة هي الخيار الأول لآلام المفصل الالتهابية، مع مراعاة مدة الاستخدام." },
        { text: "أي من الأدوية التالية يعتبر مانعاً لقنوات الكالسيوم وقد يسبب تضخم اللثة؟", options: ["أملوديبين", "ليسينوبريل", "لوسارتان", "ميتوبرولول"], correct: 0, explanation: "✅ أملوديبين (ونيفيديبين) من حاصرات قنوات الكالسيوم التي تسبب تضخم اللثة." },
        { text: "ما هو الإجراء الدوائي الصحيح عند مريض يعاني من ألم حاد ويتناول كودايين بشكل منتظم (تحمل)؟", options: ["زيادة جرعة الكودايين", "إضافة باراسيتامول أو إيبوبروفين", "تحويل إلى ترامادول", "إعطاء نالوكسون"], correct: 1, explanation: "✅ الجمع مع باراسيتامول أو NSAIDs يعطي تسكيناً أفضل وآثاراً جانبية أقل من زيادة الأفيوني." }
    ];
    // التأكد من العدد 40
    console.log("عدد السيناريوهات:", rawScenarios.length);
    let shuffledScenarios = [];
    let currentIndex = 0, score = 0, answerLock = false, autoTimer = null, gameActive = false;
    const cover = document.getElementById('coverScreen');
    const game = document.getElementById('gameScreen');
    const startBtn = document.getElementById('startGameBtn');
    const caseCounterSpan = document.getElementById('caseCounter');
    const scoreDisplaySpan = document.getElementById('scoreDisplay');
    const scenarioTextDiv = document.getElementById('scenarioText');
    const optionsContainer = document.getElementById('optionsContainer');
    const explanationBox = document.getElementById('explanationBox');
    const autoNextMsgSpan = document.getElementById('autoNextMsg');
    function shuffleOptions(scenario) {
        let opts = [...scenario.options];
        let correctIndex = scenario.correct;
        let correctText = opts[correctIndex];
        let items = opts.map((text, idx) => ({ text, isCorrect: idx === correctIndex }));
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        const shuffledOptions = items.map(item => item.text);
        const newCorrectIndex = items.findIndex(item => item.isCorrect);
        return { shuffledOptions, newCorrectIndex };
    }
    function loadQuestion() {
        if (!gameActive) return;
        if (currentIndex >= shuffledScenarios.length) { finishGame(); return; }
        answerLock = false;
        if (autoTimer) clearTimeout(autoTimer);
        autoNextMsgSpan.innerHTML = "";
        const s = shuffledScenarios[currentIndex];
        scenarioTextDiv.innerText = s.text;
        caseCounterSpan.innerText = `الحالة ${currentIndex+1} / ${shuffledScenarios.length}`;
        const { shuffledOptions, newCorrectIndex } = shuffleOptions(s);
        s._shuffledOptions = shuffledOptions;
        s._currentCorrectIndex = newCorrectIndex;
        optionsContainer.innerHTML = '';
        shuffledOptions.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65+idx)}- ${opt}`;
            btn.addEventListener('click', () => handleAnswer(idx, btn));
            optionsContainer.appendChild(btn);
        });
        explanationBox.innerHTML = "✨ اختر الإجابة الصحيحة لتحصل على الشرح والنقاط.";
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }
    function handleAnswer(selectedIdx, clickedBtn) {
        if (answerLock || !gameActive) return;
        answerLock = true;
        const s = shuffledScenarios[currentIndex];
        const isCorrect = (selectedIdx === s._currentCorrectIndex);
        if (isCorrect) { score += 10; scoreDisplaySpan.innerText = `⭐ النقاط: ${score}`; }
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach((btn, i) => {
            btn.disabled = true;
            if (i === s._currentCorrectIndex) btn.classList.add('correct-highlight');
            if (i === selectedIdx && !isCorrect) btn.classList.add('wrong-highlight');
        });
        if (isCorrect) clickedBtn.classList.add('correct-highlight');
        explanationBox.innerHTML = `${isCorrect ? '✅ إجابة صحيحة! +10 نقاط' : '❌ إجابة خاطئة'}<br><br>📖 ${s.explanation}`;
        autoNextMsgSpan.innerHTML = "⏩ الانتقال إلى الحالة التالية خلال 3 ثوانٍ...";
        autoTimer = setTimeout(() => { currentIndex++; loadQuestion(); }, 3000);
    }
    function finishGame() {
        gameActive = false;
        explanationBox.innerHTML = `🏆 انتهى التمرين! نقاطك: ${score} من ${shuffledScenarios.length*10} 🎉<br>👏 أحسنت، واصل تطوير معرفتك الدوائية.`;
        optionsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center;"><button class="restart-btn" id="restartGameBtn">🔄 إعادة التمرين</button></div>`;
        scenarioTextDiv.innerText = "✨ أكملت جميع الحالات الدوائية بنجاح! ✨";
        autoNextMsgSpan.innerHTML = "";
        const restartBtn = document.getElementById('restartGameBtn');
        if (restartBtn) restartBtn.addEventListener('click', () => initGame());
    }
    function initGame() {
        shuffledScenarios = [...rawScenarios];
        for (let i = shuffledScenarios.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledScenarios[i], shuffledScenarios[j]] = [shuffledScenarios[j], shuffledScenarios[i]];
        }
        currentIndex = 0; score = 0; answerLock = false; gameActive = true;
        if (autoTimer) clearTimeout(autoTimer);
        scoreDisplaySpan.innerText = `⭐ النقاط: 0`;
        loadQuestion();
    }
    startBtn.addEventListener('click', () => {
        cover.style.display = 'none';
        game.style.display = 'block';
        initGame();
    });
})();
</script>
